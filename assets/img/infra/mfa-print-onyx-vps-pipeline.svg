<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
<title id="title">MFA Print &amp; Onyx VPS Pipeline</title>
<desc id="desc">Downloaders, RIP stations, job forwarding and Zund cut queue</desc>
<defs>
  <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
    <stop offset="0%" stop-color="#071A32"/>
    <stop offset="55%" stop-color="#0A2342"/>
    <stop offset="100%" stop-color="#0B274D"/>
  </linearGradient>
  <linearGradient id="accent" x1="0" x2="1" y1="0" y2="1">
    <stop offset="0%" stop-color="#FF6B5F"/>
    <stop offset="100%" stop-color="#8FD7FF"/>
  </linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
  </filter>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L10,5 L0,10 z" fill="#8FD7FF"/>
  </marker>
  <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
    <path d="M44 0H0V44" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  </pattern>
</defs>
<rect width="960" height="520" rx="30" fill="url(#bg)"/>
<rect width="960" height="520" rx="30" fill="url(#grid)"/>
<circle cx="805" cy="90" r="140" fill="#FF6B5F" opacity=".10"/>
<circle cx="150" cy="445" r="170" fill="#8FD7FF" opacity=".11"/>
<text x="52" y="68" font-family="IBM Plex Mono, Menlo, monospace" font-size="15" letter-spacing="3" fill="#FF6B5F">INFRASTRUCTURE ARTIFACT</text>
<text x="52" y="113" font-family="Fraunces, Georgia, serif" font-size="38" fill="#FFFFFF" font-weight="600">MFA Print &amp; Onyx VPS Pipeline</text>
<text x="52" y="145" font-family="IBM Plex Sans, Arial, sans-serif" font-size="18" fill="#D7E2F0">Downloaders, RIP stations, job forwarding and Zund cut queue</text>

<line x1="215" y1="282.5" x2="285" y2="282.5" stroke="#8FD7FF" stroke-width="4" opacity=".85" marker-end="url(#arrow)"/>
<line x1="445" y1="282.5" x2="515" y2="282.5" stroke="#8FD7FF" stroke-width="4" opacity=".85" marker-end="url(#arrow)"/>
<line x1="675" y1="282.5" x2="745" y2="282.5" stroke="#8FD7FF" stroke-width="4" opacity=".85" marker-end="url(#arrow)"/>
<g filter="url(#shadow)"><rect x="55" y="215" width="160" height="135" rx="20" fill="rgba(255,255,255,0.08)" stroke="#8FD7FF" stroke-width="2"/></g>
<text x="135.0" y="253" text-anchor="middle" font-family="IBM Plex Sans, Arial, sans-serif" font-size="22" font-weight="700" fill="#FFFFFF">Downloaders</text>
<text x="135.0" y="308" text-anchor="middle" font-family="IBM Plex Mono, Menlo, monospace" font-size="14" fill="#D7E2F0">job intake</text>
<g filter="url(#shadow)"><rect x="285" y="215" width="160" height="135" rx="20" fill="rgba(255,255,255,0.08)" stroke="#FF6B5F" stroke-width="2"/></g>
<text x="365.0" y="253" text-anchor="middle" font-family="IBM Plex Sans, Arial, sans-serif" font-size="22" font-weight="700" fill="#FFFFFF">RIP / Onyx</text>
<text x="365.0" y="308" text-anchor="middle" font-family="IBM Plex Mono, Menlo, monospace" font-size="14" fill="#D7E2F0">render pipeline</text>
<g filter="url(#shadow)"><rect x="515" y="215" width="160" height="135" rx="20" fill="rgba(255,255,255,0.08)" stroke="#8FD7FF" stroke-width="2"/></g>
<text x="595.0" y="253" text-anchor="middle" font-family="IBM Plex Sans, Arial, sans-serif" font-size="22" font-weight="700" fill="#FFFFFF">Packing Slips</text>
<text x="595.0" y="308" text-anchor="middle" font-family="IBM Plex Mono, Menlo, monospace" font-size="14" fill="#D7E2F0">ops output</text>
<g filter="url(#shadow)"><rect x="745" y="215" width="160" height="135" rx="20" fill="rgba(255,255,255,0.08)" stroke="#FF6B5F" stroke-width="2"/></g>
<text x="825.0" y="253" text-anchor="middle" font-family="IBM Plex Sans, Arial, sans-serif" font-size="22" font-weight="700" fill="#FFFFFF">Zund Cut Queue</text>
<text x="825.0" y="308" text-anchor="middle" font-family="IBM Plex Mono, Menlo, monospace" font-size="14" fill="#D7E2F0">production</text>
<rect x="0" y="512" width="960" height="8" fill="url(#accent)"/></svg>