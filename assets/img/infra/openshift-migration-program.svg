<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
<title id="title">OpenShift migration program</title>
<desc id="desc">RVTools, UCS audit, backlog and migration wave planning</desc>
<defs>
  <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
    <stop offset="0%" stop-color="#071A32"/>
    <stop offset="55%" stop-color="#0A2342"/>
    <stop offset="100%" stop-color="#0B274D"/>
  </linearGradient>
  <linearGradient id="accent" x1="0" x2="1" y1="0" y2="1">
    <stop offset="0%" stop-color="#FF6B5F"/>
    <stop offset="100%" stop-color="#8FD7FF"/>
  </linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
  </filter>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L10,5 L0,10 z" fill="#8FD7FF"/>
  </marker>
  <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
    <path d="M44 0H0V44" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  </pattern>
</defs>
<rect width="960" height="520" rx="30" fill="url(#bg)"/>
<rect width="960" height="520" rx="30" fill="url(#grid)"/>
<circle cx="805" cy="90" r="140" fill="#FF6B5F" opacity=".10"/>
<circle cx="150" cy="445" r="170" fill="#8FD7FF" opacity=".11"/>
<text x="52" y="68" font-family="IBM Plex Mono, Menlo, monospace" font-size="15" letter-spacing="3" fill="#FF6B5F">INFRASTRUCTURE ARTIFACT</text>
<text x="52" y="113" font-family="Fraunces, Georgia, serif" font-size="38" fill="#FFFFFF" font-weight="600">OpenShift migration program</text>
<text x="52" y="145" font-family="IBM Plex Sans, Arial, sans-serif" font-size="18" fill="#D7E2F0">RVTools, UCS audit, backlog and migration wave planning</text>

<line x1="230" y1="280.0" x2="290" y2="280.0" stroke="#8FD7FF" stroke-width="4" opacity=".85" marker-end="url(#arrow)"/>
<line x1="465" y1="280.0" x2="525" y2="280.0" stroke="#8FD7FF" stroke-width="4" opacity=".85" marker-end="url(#arrow)"/>
<line x1="700" y1="280.0" x2="760" y2="280.0" stroke="#8FD7FF" stroke-width="4" opacity=".85" marker-end="url(#arrow)"/>
<g filter="url(#shadow)"><rect x="55" y="210" width="175" height="140" rx="20" fill="rgba(255,255,255,0.08)" stroke="#8FD7FF" stroke-width="2"/></g>
<text x="142.5" y="248" text-anchor="middle" font-family="IBM Plex Sans, Arial, sans-serif" font-size="22" font-weight="700" fill="#FFFFFF">vCenter / RVTools</text>
<text x="142.5" y="308" text-anchor="middle" font-family="IBM Plex Mono, Menlo, monospace" font-size="14" fill="#D7E2F0">838 prod VMs</text>
<g filter="url(#shadow)"><rect x="290" y="210" width="175" height="140" rx="20" fill="rgba(255,255,255,0.08)" stroke="#FF6B5F" stroke-width="2"/></g>
<text x="377.5" y="248" text-anchor="middle" font-family="IBM Plex Sans, Arial, sans-serif" font-size="22" font-weight="700" fill="#FFFFFF">UCS health audit</text>
<text x="377.5" y="308" text-anchor="middle" font-family="IBM Plex Mono, Menlo, monospace" font-size="14" fill="#D7E2F0">68 blades checked</text>
<g filter="url(#shadow)"><rect x="525" y="210" width="175" height="140" rx="20" fill="rgba(255,255,255,0.08)" stroke="#8FD7FF" stroke-width="2"/></g>
<text x="612.5" y="248" text-anchor="middle" font-family="IBM Plex Sans, Arial, sans-serif" font-size="22" font-weight="700" fill="#FFFFFF">Jira backlog</text>
<text x="612.5" y="308" text-anchor="middle" font-family="IBM Plex Mono, Menlo, monospace" font-size="14" fill="#D7E2F0">findings to tickets</text>
<g filter="url(#shadow)"><rect x="760" y="210" width="145" height="140" rx="20" fill="rgba(255,255,255,0.08)" stroke="#FF6B5F" stroke-width="2"/></g>
<text x="832.5" y="248" text-anchor="middle" font-family="IBM Plex Sans, Arial, sans-serif" font-size="22" font-weight="700" fill="#FFFFFF">OpenShift POC</text>
<text x="832.5" y="308" text-anchor="middle" font-family="IBM Plex Mono, Menlo, monospace" font-size="14" fill="#D7E2F0">SNO path</text>
<rect x="0" y="512" width="960" height="8" fill="url(#accent)"/></svg>